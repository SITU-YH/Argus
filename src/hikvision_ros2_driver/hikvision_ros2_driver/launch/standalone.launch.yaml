launch:
  - arg:
      name: camera_name
  
  - node:
      pkg: hikvision_ros2_driver
      exec: hikvision_ros2_driver_node
      namespace: /driver/hikvision/$(var camera_name)
      param:
        - name: camera_name
          value: $(var camera_name)
        
        # 【新增】让相机驱动去读取刚才写好的内参文件
        - name: camera_info_url
          value: "file:///home/styh/argus_ws/src/hikvision_ros2_driver/hikvision_ros2_driver/launch/camera_info.yaml"
